<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temas & Acciones</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:        #F7F6F3;
    --surface:   #FFFFFF;
    --border:    #E8E4DC;
    --text:      #2C2A26;
    --muted:     #9B9690;
    --accent:    #3D6B5E;
    --accent-lt: #EAF2EF;
    --danger:    #C0392B;
    --done-bg:   #F3F3F0;
    --done-text: #B0ADA6;
    --shadow:    0 1px 4px rgba(0,0,0,0.07);
    --radius:    10px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg); color: var(--text); font-size: 15px; min-height: 100vh; }

  /* ── LOGIN ── */
  .login {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh;
    gap: 1rem; padding: 2rem; text-align: center;
  }
  .login h1 { font-size: 1.4rem; font-weight: 800; color: var(--accent); }
  .login p { color: var(--muted); font-size: 0.88rem; max-width: 300px; line-height: 1.6; }
  .login-form { display: flex; flex-direction: column; gap: 0.65rem; width: 100%; max-width: 320px; }
  .login-input {
    width: 100%; padding: 0.65rem 0.85rem;
    border: 1px solid var(--border); border-radius: 8px;
    font-size: 0.92rem; font-family: inherit; background: white;
    color: var(--text); outline: none; -webkit-appearance: none;
  }
  .login-input:focus { border-color: var(--accent); }
  .login-btn {
    background: var(--accent); color: white; border: none;
    border-radius: 10px; padding: 0.75rem; font-size: 0.95rem;
    font-weight: 700; cursor: pointer; font-family: inherit;
  }
  .login-btn:hover { opacity: 0.88; }
  .login-error { color: var(--danger); font-size: 0.83rem; display: none; }

  /* ── HEADER ── */
  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 1rem 1.25rem 0; position: sticky; top: 0; z-index: 100;
  }
  .header-top { display: flex; align-items: center; gap: 0.75rem; padding-bottom: 0.75rem; }
  .app-title { font-size: 1.05rem; font-weight: 700; color: var(--accent); flex: 1; letter-spacing: -0.01em; }
  .header-search {
    flex: 1; max-width: 240px; padding: 0.45rem 0.75rem;
    border: 1px solid var(--border); border-radius: 20px;
    font-size: 0.88rem; background: var(--bg); color: var(--text); outline: none;
  }
  .header-search:focus { border-color: var(--accent); }
  .hdr-btn {
    padding: 0.4rem 0.85rem; border-radius: 8px; border: none;
    font-size: 0.8rem; font-weight: 700; cursor: pointer; font-family: inherit;
    white-space: nowrap;
  }
  .hdr-btn.save { background: var(--accent); color: white; display: none; }
  .hdr-btn.logout { background: var(--border); color: var(--muted); }
  .hdr-btn:hover { opacity: 0.85; }
  .save-status { font-size: 0.78rem; color: var(--muted); white-space: nowrap; }

  /* ── TABS ── */
  .tabs-wrap { display: flex; gap: 0.35rem; overflow-x: auto; padding-bottom: 0; scrollbar-width: none; }
  .tabs-wrap::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0; padding: 0.45rem 0.85rem;
    border: none; border-bottom: 2px solid transparent;
    background: none; cursor: pointer; font-size: 0.83rem; font-weight: 500;
    color: var(--muted); font-family: inherit; border-radius: 6px 6px 0 0;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 700; }
  .tab .count { display: inline-block; font-size: 0.72rem; background: var(--border);
    color: var(--muted); border-radius: 10px; padding: 0 5px; margin-left: 4px; font-weight: 600; }
  .tab.active .count { background: var(--accent-lt); color: var(--accent); }

  /* ── MAIN ── */
  main { padding: 1.25rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1rem; align-items: start; }

  /* ── CARD ── */
  .card { background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .card-header { display: flex; align-items: center; gap: 0.5rem;
    padding: 0.75rem 1rem 0.65rem; border-bottom: 1px solid var(--border); }
  .card-title { font-size: 0.92rem; font-weight: 700; color: var(--text);
    flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-actions { display: flex; gap: 0.25rem; }
  .drag-handle { color: var(--border); cursor: grab; font-size: 1.1rem;
    padding: 0 2px; user-select: none; touch-action: none; flex-shrink: 0; line-height: 1; }
  .drag-handle:hover { color: var(--muted); }
  .card.dragging { opacity: 0.35; }
  .card.drag-over { outline: 2px solid var(--accent); outline-offset: 2px; }
  .icon-btn { background: none; border: none; cursor: pointer; padding: 4px 6px;
    border-radius: 5px; color: var(--muted); font-size: 14px; transition: background 0.12s, color 0.12s; }
  .icon-btn:hover { background: var(--bg); color: var(--text); }
  .icon-btn.danger:hover { color: var(--danger); }

  /* ── TASK LIST ── */
  .task-list { padding: 0.35rem 0; }
  .task-item { display: flex; align-items: flex-start; gap: 0.6rem;
    padding: 0.55rem 1rem; border-bottom: 1px solid #F2EFE9; transition: background 0.1s; }
  .task-item:last-child { border-bottom: none; }
  .task-item:hover { background: var(--bg); }
  .task-item.done { background: var(--done-bg); }
  .task-cb {
    appearance: none; -webkit-appearance: none; width: 17px; height: 17px;
    flex-shrink: 0; border: 2px solid var(--border); border-radius: 4px;
    cursor: pointer; margin-top: 2px; background: white; position: relative;
    transition: background 0.15s, border-color 0.15s;
  }
  .task-cb:checked { background: var(--accent); border-color: var(--accent); }
  .task-cb:checked::after { content: "✓"; color: white; font-size: 10px;
    font-weight: 700; position: absolute; top: -1px; left: 1px; }
  .task-text { flex: 1; font-size: 0.87rem; line-height: 1.45; color: var(--text); word-break: break-word; }
  .task-item.done .task-text { text-decoration: line-through; color: var(--done-text); }
  .task-del { background: none; border: none; cursor: pointer; color: transparent;
    font-size: 12px; padding: 0 2px; flex-shrink: 0; transition: color 0.12s; }
  .task-item:hover .task-del { color: var(--muted); }
  .task-del:hover { color: var(--danger) !important; }

  /* ── ADD TASK ── */
  .add-task-form { display: none; padding: 0.6rem 1rem; border-top: 1px solid var(--border);
    gap: 0.5rem; flex-direction: column; background: var(--accent-lt); }
  .add-task-form.open { display: flex; }
  .add-task-form textarea { width: 100%; padding: 0.5rem 0.65rem;
    border: 1px solid var(--border); border-radius: 6px; font-size: 0.85rem;
    font-family: inherit; resize: vertical; min-height: 60px;
    background: white; color: var(--text); outline: none; -webkit-appearance: none; }
  .add-task-form textarea:focus { border-color: var(--accent); }
  .form-row { display: flex; gap: 0.5rem; justify-content: flex-end; }
  .btn { padding: 0.4rem 0.9rem; border-radius: 6px; font-size: 0.83rem;
    cursor: pointer; font-family: inherit; font-weight: 600; border: none; }
  .btn.cancel { background: var(--border); color: var(--muted); }
  .btn.save-task { background: var(--accent); color: white; }
  .btn.danger { background: var(--danger); color: white; }
  .btn:hover { opacity: 0.85; }

  /* ── SHOW MORE ── */
  .show-more-btn { display: block; width: 100%; padding: 0.4rem 1rem;
    background: none; border: none; border-top: 1px solid var(--border);
    color: var(--accent); font-size: 0.8rem; font-weight: 600;
    cursor: pointer; text-align: center; font-family: inherit; }
  .show-more-btn:hover { background: var(--accent-lt); }

  /* ── NEW TOPIC ── */
  .new-topic-trigger { width: 100%; min-height: 72px; background: none; border: none;
    cursor: pointer; color: var(--muted); font-size: 0.88rem; font-weight: 600;
    font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 0.4rem; }
  .new-topic-trigger:hover { color: var(--accent); }
  .new-topic-form { display: none; width: 100%; padding: 0.75rem;
    flex-direction: column; gap: 0.5rem; background: var(--accent-lt); border-top: 1px solid var(--border); }
  .new-topic-form.open { display: flex; }
  .new-topic-form input { width: 100%; padding: 0.55rem 0.7rem;
    border: 1px solid var(--border); border-radius: 6px; font-size: 0.92rem;
    font-family: inherit; background: white; color: var(--text); outline: none; -webkit-appearance: none; }
  .new-topic-form input:focus { border-color: var(--accent); }

  /* ── CONFIRM ── */
  .confirm-overlay { display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.45); z-index: 500;
    align-items: center; justify-content: center; padding: 1.5rem; }
  .confirm-overlay.open { display: flex; }
  .confirm-box { background: white; border-radius: 14px; padding: 1.5rem;
    max-width: 320px; width: 100%; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
  .confirm-box p { font-size: 0.92rem; line-height: 1.5; margin-bottom: 1.1rem; color: var(--text); }
  .confirm-row { display: flex; gap: 0.5rem; justify-content: flex-end; }

  /* ── LOADING ── */
  .loading { display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; gap: 1rem; color: var(--muted); font-size: 0.92rem; }
  .spinner { width: 28px; height: 28px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── MISC ── */
  .empty-topic { padding: 0.75rem 1rem; font-size: 0.83rem; color: var(--muted); font-style: italic; }
  .no-results { text-align: center; color: var(--muted); padding: 3rem 1rem; font-size: 0.95rem; display: none; }
  mark.highlight { background: #fff3b0; border-radius: 2px; }
  .dirty-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    background: #e67e22; margin-left: 5px; vertical-align: middle; display: none; }

  @media (max-width: 500px) {
    main { padding: 0.75rem; }
    .grid { grid-template-columns: 1fr; }
    .task-cb { width: 20px; height: 20px; }
    .tab { padding: 0.55rem 0.9rem; font-size: 0.85rem; }
    .icon-btn { padding: 6px 8px; font-size: 15px; }
    .btn { padding: 0.5rem 1rem; font-size: 0.9rem; }
    .header-search { max-width: 130px; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="screen-login" class="login">
  <div style="font-size:2.5rem">🗂</div>
  <h1>Temas & Acciones</h1>
  <p>Introduce tu GitHub Personal Access Token para cargar los datos.</p>
  <div class="login-form">
    <input class="login-input" type="password" id="inp-token" placeholder="ghp_xxxxxxxxxxxx"
      autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
      onkeydown="if(event.key==='Enter')doLogin()">
    <input class="login-input" type="text" id="inp-repo"
      value="martinlla/tareas-data"
      autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
      onkeydown="if(event.key==='Enter')doLogin()">
    <input class="login-input" type="text" id="inp-file"
      value="tareas.json"
      autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- LOADING -->
<div id="screen-loading" class="loading" style="display:none">
  <div class="spinner"></div>
  <span id="loading-msg">Cargando…</span>
</div>

<!-- APP -->
<div id="screen-app" style="display:none">
  <header>
    <div class="header-top">
      <div class="app-title">🗂 Temas & Acciones <span class="dirty-dot" id="dirty-dot"></span></div>
      <input class="header-search" type="search" placeholder="Buscar…" oninput="onSearch(this.value)">
      <span class="save-status" id="save-status"></span>
      <button class="hdr-btn save" id="save-btn" onclick="saveData()">💾 Guardar</button>
      <button class="hdr-btn logout" onclick="doLogout()">✕</button>
    </div>
    <div class="tabs-wrap" id="tabs"></div>
  </header>
  <main>
    <div class="grid" id="grid"></div>
    <div class="no-results" id="no-results">No hay resultados para "<span id="no-q"></span>"</div>
  </main>
</div>

<!-- CONFIRM DIALOG -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <p id="confirm-msg"></p>
    <div class="confirm-row">
      <button class="btn cancel" id="confirm-cancel">Cancelar</button>
      <button class="btn danger" id="confirm-ok">Eliminar</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
let GH_TOKEN = "";
let GH_REPO  = "";   // "usuario/repo"
let GH_FILE  = "";   // "tareas.json"
let GH_SHA   = "";   // necesario para PUT

// ── STATE ─────────────────────────────────────────────────────────────────────
let DATA = [];
let activeFolders = new Set();
let searchQuery = "";
const VISIBLE_LIMIT = 10;
let expandedTopics = new Set();
let dirty = false;

// ── SCREENS ───────────────────────────────────────────────────────────────────
function show(id) {
  ["screen-login","screen-loading","screen-app"].forEach(s =>
    document.getElementById(s).style.display = s === id ? (id === "screen-app" ? "block" : "flex") : "none"
  );
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
async function doLogin() {
  const token = document.getElementById("inp-token").value.trim();
  const repo  = document.getElementById("inp-repo").value.trim();
  const file  = document.getElementById("inp-file").value.trim() || "tareas.json";
  const err   = document.getElementById("login-error");
  err.style.display = "none";

  if (!token || !repo) {
    err.textContent = "Token y repo son obligatorios.";
    err.style.display = "block"; return;
  }

  GH_TOKEN = token; GH_REPO = repo; GH_FILE = file;
  show("screen-loading");
  document.getElementById("loading-msg").textContent = "Cargando datos…";

  const ok = await loadData();
  if (!ok) {
    GH_TOKEN = ""; show("screen-login");
    err.style.display = "block";
  }
}

function doLogout() {
  GH_TOKEN = ""; GH_REPO = ""; GH_FILE = ""; GH_SHA = "";
  DATA = []; dirty = false;
  document.getElementById("inp-token").value = "";
  show("screen-login");
}

// ── GITHUB API ────────────────────────────────────────────────────────────────
async function ghFetch(path, opts = {}) {
  const res = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}${path}`, {
    ...opts,
    headers: {
      "Authorization": `Bearer ${GH_TOKEN}`,
      "Accept": "application/vnd.github+json",
      "X-GitHub-Api-Version": "2022-11-28",
      ...(opts.headers || {})
    }
  });
  return res;
}

async function loadData() {
  try {
    const res = await ghFetch("");
    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      const err = document.getElementById("login-error");
      if (res.status === 401) err.textContent = "Token inválido o sin permisos.";
      else if (res.status === 404) err.textContent = `Archivo no encontrado: ${GH_REPO}/${GH_FILE}`;
      else err.textContent = `Error ${res.status}: ${body.message || "desconocido"}`;
      return false;
    }
    const json = await res.json();
    GH_SHA = json.sha;
    const binary = atob(json.content.replace(/\n/g, ""));
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const text = new TextDecoder("utf-8").decode(bytes);
    DATA = JSON.parse(text);
    setDirty(false);
    renderTabs(); render();
    show("screen-app");
    return true;
  } catch(e) {
    document.getElementById("login-error").textContent = "Error de red: " + e.message;
    return false;
  }
}

async function saveData() {
  if (!dirty) return;
  const btn = document.getElementById("save-btn");
  btn.disabled = true;
  btn.textContent = "⏳ Guardando…";
  document.getElementById("save-status").textContent = "";

  try {
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(DATA, null, 2))));
    const res = await ghFetch("", {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        message: "update tareas",
        content,
        sha: GH_SHA
      })
    });

    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      document.getElementById("save-status").textContent = "❌ Error al guardar";
      console.error(body);
    } else {
      const body = await res.json();
      GH_SHA = body.content.sha;
      setDirty(false);
      document.getElementById("save-status").textContent = "✓ Guardado";
      setTimeout(() => document.getElementById("save-status").textContent = "", 3000);
    }
  } catch(e) {
    document.getElementById("save-status").textContent = "❌ Error de red";
  }

  btn.disabled = false;
  btn.textContent = "💾 Guardar";
}

// ── DIRTY STATE ───────────────────────────────────────────────────────────────
function setDirty(val) {
  dirty = val;
  document.getElementById("dirty-dot").style.display = val ? "inline-block" : "none";
  document.getElementById("save-btn").style.display   = val ? "inline-block" : "none";
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}
function highlightText(text, q) {
  if (!q) return esc(text);
  const idx = text.toLowerCase().indexOf(q.toLowerCase());
  if (idx < 0) return esc(text);
  return esc(text.slice(0,idx)) +
    `<mark class="highlight">${esc(text.slice(idx,idx+q.length))}</mark>` +
    esc(text.slice(idx+q.length));
}

// ── SEARCH ────────────────────────────────────────────────────────────────────
function onSearch(val) { searchQuery = val.trim().toLowerCase(); render(); }

// ── TABS ──────────────────────────────────────────────────────────────────────
function renderTabs() {
  const tabs = document.getElementById("tabs");
  const total = DATA.reduce((s,f) => s + f.tasks.filter(t=>!t.done).length, 0);
  const allActive = activeFolders.size === 0;
  let html = `<button class="tab ${allActive?"active":""}" onclick="setFolder('All')">Todos <span class="count">${total}</span></button>`;
  for (const f of DATA) {
    const isActive = activeFolders.has(f.topic);
    const pending = f.tasks.filter(t => !t.done).length;
    html += `<button class="tab ${isActive?"active":""}" onclick="setFolder('${esc(f.topic)}')">${esc(f.topic)} <span class="count">${pending}</span></button>`;
  }
  tabs.innerHTML = html;
}
function setFolder(name) {
  if (name === "All") { activeFolders.clear(); }
  else { activeFolders.has(name) ? activeFolders.delete(name) : activeFolders.add(name); }
  renderTabs(); render();
}
function toggleExpand(fi) {
  expandedTopics.has(fi) ? expandedTopics.delete(fi) : expandedTopics.add(fi);
  render();
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  const grid = document.getElementById("grid");
  const q = searchQuery;
  let anyVisible = false, html = "";

  for (let fi = 0; fi < DATA.length; fi++) {
    const folder = DATA[fi];
    if (activeFolders.size > 0 && !activeFolders.has(folder.topic)) continue;
    const visTasks = folder.tasks.filter(t => !q || t.text.toLowerCase().includes(q));
    if (visTasks.length === 0 && q) continue;
    anyVisible = true;
    const isExpanded = expandedTopics.has(fi);

    html += `<div class="card" data-fi="${fi}"
      draggable="true"
      ondragstart="onCardDragStart(event,${fi})"
      ondragover="onCardDragOver(event,${fi})"
      ondragleave="onCardDragLeave(event)"
      ondrop="onCardDrop(event,${fi})">
      <div class="card-header">
        <span class="drag-handle"
          ontouchstart="onCardTouchStart(event,${fi})"
          title="Arrastrar para reordenar">⠿</span>
        <span class="card-title">${esc(folder.topic)}</span>
        <div class="card-actions">
          <button class="icon-btn" title="Añadir acción" onclick="toggleAddForm(${fi})">＋</button>
          <button class="icon-btn danger" title="Eliminar tema" onclick="deleteTopic(${fi})">🗑</button>
        </div>
      </div>
      <div class="task-list">`;

    let shown = 0;
    for (let ti = 0; ti < folder.tasks.length; ti++) {
      const task = folder.tasks[ti];
      if (q && !task.text.toLowerCase().includes(q)) continue;
      if (!q && !isExpanded && shown >= VISIBLE_LIMIT) continue;
      shown++;
      html += `<div class="task-item ${task.done?"done":""}">
        <input type="checkbox" class="task-cb" ${task.done?"checked":""}
          onchange="toggleTask(${fi},${ti},this.checked)">
        <span class="task-text">${highlightText(task.text, searchQuery)}</span>
        <button class="task-del" title="Eliminar" onclick="deleteTask(${fi},${ti})">✕</button>
      </div>`;
    }

    if (!visTasks.length) html += `<div class="empty-topic">Sin acciones aún</div>`;
    html += `</div>`;

    const hiddenCount = !q ? folder.tasks.length - VISIBLE_LIMIT : 0;
    if (hiddenCount > 0) {
      html += isExpanded
        ? `<button class="show-more-btn" onclick="toggleExpand(${fi})">▲ Ver menos</button>`
        : `<button class="show-more-btn" onclick="toggleExpand(${fi})">▼ Ver ${hiddenCount} más</button>`;
    }

    html += `<div class="add-task-form" id="form-${fi}">
        <textarea id="ta-${fi}" placeholder="Nueva acción o nota…" rows="2"></textarea>
        <div class="form-row">
          <button class="btn cancel" onclick="toggleAddForm(${fi})">Cancelar</button>
          <button class="btn save-task" onclick="saveTask(${fi})">Añadir</button>
        </div>
      </div>
    </div>`;
  }

  // New topic card
  html += `<div class="card" style="border:2px dashed var(--border);box-shadow:none;background:var(--surface);">
    <button class="new-topic-trigger" onclick="toggleNewTopicForm()">＋ Nuevo tema</button>
    <div class="new-topic-form" id="new-topic-form">
      <input type="text" id="new-topic-input" placeholder="Nombre del tema…" maxlength="80"
        onkeydown="if(event.key==='Enter')saveNewTopic()">
      <div class="form-row">
        <button class="btn cancel" onclick="toggleNewTopicForm()">Cancelar</button>
        <button class="btn save-task" onclick="saveNewTopic()">Crear</button>
      </div>
    </div>
  </div>`;

  grid.innerHTML = html;
  document.getElementById("no-results").style.display =
    anyVisible ? "none" : (q ? "block" : "none");
  if (q) document.getElementById("no-q").textContent = q;
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function toggleAddForm(fi) {
  const form = document.getElementById(`form-${fi}`);
  if (form.classList.toggle("open")) document.getElementById(`ta-${fi}`).focus();
}
function saveTask(fi) {
  const ta = document.getElementById(`ta-${fi}`);
  const text = ta.value.trim();
  if (!text) return;
  DATA[fi].tasks.push({ text, done: false });
  ta.value = "";
  setDirty(true); renderTabs(); render();
}
function toggleTask(fi, ti, checked) {
  DATA[fi].tasks[ti].done = checked;
  setDirty(true); renderTabs(); render();
}
function deleteTask(fi, ti) {
  showConfirm(`¿Eliminar "${DATA[fi].tasks[ti].text}"?`, () => {
    DATA[fi].tasks.splice(ti, 1);
    setDirty(true); renderTabs(); render();
  });
}
function deleteTopic(fi) {
  showConfirm(`¿Eliminar el tema "${DATA[fi].topic}" y todas sus acciones?`, () => {
    activeFolders.delete(DATA[fi].topic);
    DATA.splice(fi, 1);
    setDirty(true); renderTabs(); render();
  });
}

// ── NEW TOPIC ─────────────────────────────────────────────────────────────────
function toggleNewTopicForm() {
  const form = document.getElementById("new-topic-form");
  if (form) {
    form.classList.toggle("open");
    if (form.classList.contains("open")) document.getElementById("new-topic-input").focus();
  }
}
function saveNewTopic() {
  const input = document.getElementById("new-topic-input");
  if (!input) return;
  const trimmed = input.value.trim();
  if (!trimmed) return;
  if (DATA.find(f => f.topic === trimmed)) {
    showConfirm("Ya existe un tema con ese nombre.", null, null, "Entendido", null); return;
  }
  DATA.push({ topic: trimmed, tasks: [] });
  input.value = "";
  toggleNewTopicForm();
  setDirty(true); renderTabs(); render();
}

// ── CONFIRM DIALOG ────────────────────────────────────────────────────────────
function showConfirm(msg, onOk, onCancel, okLabel, cancelLabel) {
  document.getElementById("confirm-msg").textContent = msg;
  document.getElementById("confirm-ok").textContent = okLabel || "Eliminar";
  document.getElementById("confirm-ok").onclick = () => { closeConfirm(); if (onOk) onOk(); };
  const cancelBtn = document.getElementById("confirm-cancel");
  if (cancelLabel === null) { cancelBtn.style.display = "none"; }
  else {
    cancelBtn.style.display = "";
    cancelBtn.textContent = cancelLabel || "Cancelar";
    cancelBtn.onclick = () => { closeConfirm(); if (onCancel) onCancel(); };
  }
  document.getElementById("confirm-overlay").classList.add("open");
}
function closeConfirm() { document.getElementById("confirm-overlay").classList.remove("open"); }

// ── DRAG & DROP (cards) ───────────────────────────────────────────────────────
let dragSrcFi = null;
function onCardDragStart(e, fi) {
  dragSrcFi = fi;
  e.dataTransfer.effectAllowed = "move";
  setTimeout(() => { const c = e.currentTarget; if (c) c.classList.add("dragging"); }, 0);
}
function onCardDragOver(e, fi) {
  e.preventDefault(); e.dataTransfer.dropEffect = "move";
  if (fi === dragSrcFi) return;
  document.querySelectorAll(".card").forEach(c => c.classList.remove("drag-over"));
  e.currentTarget.classList.add("drag-over");
}
function onCardDragLeave(e) { e.currentTarget.classList.remove("drag-over"); }
function onCardDrop(e, fi) {
  e.preventDefault(); e.currentTarget.classList.remove("drag-over");
  if (dragSrcFi === null || dragSrcFi === fi) return;
  const moved = DATA.splice(dragSrcFi, 1)[0];
  DATA.splice(fi, 0, moved);
  dragSrcFi = null;
  setDirty(true); renderTabs(); render();
}

// ── TOUCH DRAG (iOS) ──────────────────────────────────────────────────────────
let touchDragFi = null, touchClone = null, touchOffX = 0, touchOffY = 0;
function onCardTouchStart(e, fi) {
  if (e.touches.length !== 1) return;
  touchDragFi = fi;
  const touch = e.touches[0];
  const card = e.currentTarget.closest(".card");
  const rect = card.getBoundingClientRect();
  touchOffX = touch.clientX - rect.left;
  touchOffY = touch.clientY - rect.top;
  touchClone = card.cloneNode(true);
  touchClone.style.cssText = `position:fixed;top:${rect.top}px;left:${rect.left}px;
    width:${rect.width}px;opacity:0.75;pointer-events:none;z-index:999;
    border-radius:var(--radius);box-shadow:0 8px 24px rgba(0,0,0,0.18);`;
  document.body.appendChild(touchClone);
  card.classList.add("dragging");
  document.addEventListener("touchmove", onCardTouchMove, { passive: false });
  document.addEventListener("touchend", onCardTouchEnd);
}
function onCardTouchMove(e) {
  if (touchDragFi === null) return;
  e.preventDefault();
  const touch = e.touches[0];
  touchClone.style.top  = (touch.clientY - touchOffY) + "px";
  touchClone.style.left = (touch.clientX - touchOffX) + "px";
  touchClone.style.display = "none";
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  touchClone.style.display = "";
  document.querySelectorAll(".card").forEach(c => c.classList.remove("drag-over"));
  const targetCard = el && el.closest(".card[data-fi]");
  if (targetCard) {
    const tfi = parseInt(targetCard.dataset.fi);
    if (tfi !== touchDragFi) targetCard.classList.add("drag-over");
  }
}
function onCardTouchEnd(e) {
  document.removeEventListener("touchmove", onCardTouchMove);
  document.removeEventListener("touchend", onCardTouchEnd);
  if (touchClone) { touchClone.remove(); touchClone = null; }
  document.querySelectorAll(".card").forEach(c => {
    c.classList.remove("dragging"); c.classList.remove("drag-over");
  });
  if (touchDragFi === null) return;
  const touch = e.changedTouches[0];
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  const targetCard = el && el.closest(".card[data-fi]");
  if (targetCard) {
    const tfi = parseInt(targetCard.dataset.fi);
    if (tfi !== touchDragFi) {
      const moved = DATA.splice(touchDragFi, 1)[0];
      DATA.splice(tfi, 0, moved);
      setDirty(true); renderTabs(); render();
    }
  }
  touchDragFi = null;
}
</script>
</body>
</html>
